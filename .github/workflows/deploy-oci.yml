name: Deploy to Oracle Cloud (DayPoo)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ── Job 1: 백엔드, AI, 프론트엔드 Docker 이미지 빌드 및 푸시 ──
  build-and-push-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 백엔드 이미지 빌드
      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/daypoo-backend:latest

      # AI 서비스 이미지 빌드
      - name: Build and push AI Image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/daypoo-ai:latest

      # 프론트엔드 이미지 빌드 (VITE 환경변수 빌드타임 주입)
      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/daypoo-frontend:latest
          build-args: |
            VITE_TOSS_CLIENT_KEY=${{ secrets.VITE_TOSS_CLIENT_KEY }}
            VITE_KAKAO_MAP_KEY=${{ secrets.VITE_KAKAO_MAP_KEY }}

  # ── Job 2: OCI 인스턴스에 Docker 컨테이너 배포 ──
  deploy-to-oci:
    needs: [build-and-push-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare directory and ensure Docker on OCI
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Docker 설치 여부 확인 및 자동 설치 (Ubuntu 공식 방법)
            if ! command -v docker &> /dev/null; then
              echo "🔧 Docker not found. Installing..."
              sudo apt-get update -qq
              sudo apt-get install -y -qq ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -qq
              sudo apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker ubuntu
              echo "✅ Docker installed successfully."
            fi

            # Docker Compose v2 플러그인 확인
            if ! docker compose version &> /dev/null; then
              echo "🔧 Docker Compose plugin not found. Installing..."
              sudo apt-get update -qq
              sudo apt-get install -y -qq docker-compose-plugin
              echo "✅ Docker Compose plugin installed."
            fi

            # 버전 확인 출력
            docker --version
            docker compose version

            sudo mkdir -p /opt/daypoo
            sudo chown -R ubuntu:ubuntu /opt/daypoo

      - name: Copy docker-compose to OCI
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/daypoo/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          APP_CORS_ALLOWED_ORIGINS: ${{ secrets.APP_CORS_ALLOWED_ORIGINS }}
          APP_FRONTEND_URL: ${{ secrets.APP_FRONTEND_URL }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          TOSS_SECRET_KEY: ${{ secrets.TOSS_SECRET_KEY }}
          VITE_TOSS_CLIENT_KEY: ${{ secrets.VITE_TOSS_CLIENT_KEY }}
          VITE_KAKAO_MAP_KEY: ${{ secrets.VITE_KAKAO_MAP_KEY }}
          OPENSEARCH_URL: ${{ secrets.OPENSEARCH_URL }}
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          envs: DOCKERHUB_USERNAME,DB_PASSWORD,APP_CORS_ALLOWED_ORIGINS,APP_FRONTEND_URL,JWT_SECRET_KEY,KAKAO_CLIENT_ID,KAKAO_CLIENT_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,MAIL_USERNAME,MAIL_PASSWORD,OPENAI_API_KEY,PUBLIC_DATA_API_KEY,TOSS_SECRET_KEY,VITE_TOSS_CLIENT_KEY,VITE_KAKAO_MAP_KEY,OPENSEARCH_URL
          script: |
            set -e

            cd /opt/daypoo

            # envs 파라미터로 전달받은 환경변수를 활용하여 .env 생성 (특수문자 쉘 인젝션 방지)
            cat > .env << ENVEOF
            DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME
            DB_HOST=postgres
            DB_PORT=5432
            POSTGRES_DB=daypoo_db
            POSTGRES_USER=daypoo
            POSTGRES_PASSWORD=$DB_PASSWORD
            ALLOWED_ORIGINS=$APP_CORS_ALLOWED_ORIGINS
            FRONTEND_URL=$APP_FRONTEND_URL
            JWT_SECRET_KEY=$JWT_SECRET_KEY
            KAKAO_CLIENT_ID=$KAKAO_CLIENT_ID
            KAKAO_CLIENT_SECRET=$KAKAO_CLIENT_SECRET
            GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
            MAIL_USERNAME=$MAIL_USERNAME
            MAIL_PASSWORD=$MAIL_PASSWORD
            OPENAI_API_KEY=$OPENAI_API_KEY
            PUBLIC_DATA_API_KEY=$PUBLIC_DATA_API_KEY
            TOSS_SECRET_KEY=$TOSS_SECRET_KEY
            VITE_TOSS_CLIENT_KEY=$VITE_TOSS_CLIENT_KEY
            VITE_KAKAO_MAP_KEY=$VITE_KAKAO_MAP_KEY
            OPENSEARCH_URL=$OPENSEARCH_URL
            REDIS_HOST=redis
            REDIS_PORT=6379
            ENVEOF

            # 기존 컨테이너 이름 충돌 방지
            docker rm -f daypoo-frontend daypoo-backend daypoo-ai daypoo-redis daypoo-postgres 2>/dev/null || true

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml down --remove-orphans
            docker compose -f docker-compose.prod.yml up -d

            # 백엔드 헬스체크 (docker inspect 기반)
            echo "⏳ Waiting for backend to become healthy..."
            for i in $(seq 1 18); do
              HEALTH_STATUS=$(docker inspect --format='{{json .State.Health.Status}}' daypoo-backend 2>/dev/null || echo '"starting"')
              if [ "$HEALTH_STATUS" = '"healthy"' ]; then
                echo "✅ Backend is healthy! [$i/18]"
                break
              fi
              echo "  [$i/18] Health status is $HEALTH_STATUS, not ready yet..."
              if [ $i -eq 18 ]; then
                echo "❌ Backend failed to respond after 3 minutes. Last 50 lines of logs:"
                docker compose -f docker-compose.prod.yml logs backend --tail=50
                exit 1
              fi
              sleep 10
            done

            # 미사용 이미지 정리
            docker image prune -f
